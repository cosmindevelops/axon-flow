name: IU Validation

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  iu-001-validation:
    name: IU-001 Validation Suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.18.0

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install validation workspace dependencies
        run: pnpm install --filter @axon/validation --frozen-lockfile

      - name: Run IU-001 validation suite
        run: pnpm --filter @axon/validation exec vitest run iu-001/validators

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iu-001-validation-report
          path: scripts/validation/reports/latest/
          retention-days: 14
